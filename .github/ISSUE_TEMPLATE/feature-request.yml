name: Feature request
description: Propose a privacy-safe, local-first improvement.
title: "feature: "
labels: [feature]
body:
  - type: markdown
    attributes:
      value: |
        OpenBrain stays local and provider-agnostic. Please avoid real vault contents, private prompts, and credentials.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user need, not only an implementation idea.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: boundary
    attributes:
      label: Product boundary
      options:
        - label: This request does not require a hosted backend, telemetry, or a bundled model provider.
          required: true
