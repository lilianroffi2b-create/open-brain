name: Bug report
description: Report a reproducible problem without sharing sensitive data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Do not include credentials, private vault content, personal data, or unredacted logs.

  - type: input
    id: version
    attributes:
      label: OpenBrain version
      placeholder: 0.1.0-alpha.1
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.x or 24.x
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Safe reproduction steps
      description: Use a minimal synthetic example.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, private paths, personal data, and vault content from this report.
          required: true
