name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish package and create release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use an npm version compatible with trusted publishing
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run synthetic golden tests
        run: npm run test:golden

      - name: Validate package allowlist
        run: npm run audit:package

      - name: Verify tag matches package version
        run: node -e "const v=require('./package.json').version; const t=process.env.GITHUB_REF_NAME.replace(/^v/,''); if(v!==t){console.error('Tag '+t+' does not match package.json version '+v); process.exit(1)}"

      # Re-pushing a tag for an already-published version must not fail the run.
      - name: Check whether this version is already published
        id: published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view "${NAME}@${VERSION}" version 2>/dev/null || true)"
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # npm must trust this repository and workflow before publishing can succeed.
      - name: Publish package with provenance
        if: steps.published.outputs.exists == 'false'
        # --tag is required: npm refuses to publish a prerelease version without an explicit dist-tag.
        run: npm publish --provenance --tag latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
